# Butterfly Theme Configuration
# Docs: https://butterfly.js.org/

# ---------- 导航菜单 ----------
menu:
  首页: / || fas fa-home
  成员: /members/ || fas fa-users
  发现: javascript:void(0) || fas fa-compass
  热榜: /social/news/ || fas fa-fire
  音乐: /social/music/ || fas fa-music
  关于: /about/ || fas fa-heart

# 发现子菜单
submenu:
  发现:
    每日一图: /social/photo/ || fas fa-image
    岛屿相册: /social/album/ || fas fa-images
    大事记: /social/timeline/ || fas fa-calendar
    旅行足迹: /social/travel/ || fas fa-map-marked-alt
    食谱分享: /social/recipe/ || fas fa-utensils
    岛屿投票: /social/vote/ || fas fa-poll
    年度回顾: /social/review/ || fas fa-star
    留言板: /guestbook/ || fas fa-comment-dots
    归档: /archives/ || fas fa-archive

# ---------- 代码块 ----------
highlight_theme: light
highlight_copy: true
highlight_lang: true
code_word_wrap: true

# ---------- 社交链接 ----------
social:
  fab fa-github: https://github.com/leida1987u || GitHub

# ---------- 首页 ----------
index_img:
default_cover:
  - /img/default_cover.png

# ---------- 侧边栏 ----------
aside:
  enable: true
  position: right
  card_author:
    enable: true
    description: 记录生活中的灵感碎片 🏝️
  card_announcement:
    enable: true
    content: 欢迎来到岛屿来信！这里是一个温暖的社区。
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
  card_tags:
    enable: true
    limit: 40
  card_post_series:
    enable: true

# ---------- 文章 ----------
post_meta:
  date_type: both
  categories: true
  tags: true

toc:
  enable: true
  number: true

post_copyright:
  enable: true
  decode: false
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# ---------- 评论系统 ----------
comments:
  use: giscus
  text: true
  lazyload: false

# Giscus 配置 (需要你到 https://giscus.app 配置)
giscus:
  repo:
  repo_id:
  category:
  category_id:
  theme_light: light
  theme_dark: dark
  mapping: pathname
  reactions_enabled: true
  emit_metadata: false

# ---------- 搜索 ----------
local_search:
  enable: true
  trigger: auto
  top_n_per_article: 1
  unescape: false
  preload: true

# ---------- PWA ----------
pwa:
  enable: false

# ---------- 分析 ----------
wordcount:
  post_wordcount: true
  min2read: true
  total_wordcount: true

# ---------- 夜间模式 ----------
darkmode:
  enable: true
  button: true

# ---------- 字体 ----------
font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

# ---------- 首页封面配置 ----------
index_site_info_top:
index_top_img_height: 100vh

# ---------- 打赏 ----------
reward:
  enable: false

# ---------- Math ----------
mathjax:
  enable: false
katex:
  enable: false

# ---------- 图片懒加载 ----------
lazyload:
  enable: true
  loading_img: /img/loading.gif

# ---------- CDN ----------
CDN:
  css:
    fontawesome: https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css
  js:

# ---------- Footer ----------
footer:
  owner:
    enable: true
    since: 2026
  custom_text: 岛屿来信 · 一起记录生活
  copyright:
    enable: true

# ---------- 分页 ----------
pagination:
  enable: true
  per_page: 10
  order_by: -date

# ---------- 首页文章封面 ----------
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  position: both
  default_cover:

# ---------- 自定义注入 ----------
inject:
  head:
    - <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
  bottom:
    - <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
    - <script>document.addEventListener('DOMContentLoaded',function(){var nav=document.createElement('div');nav.className='mobile-bottom-nav';nav.innerHTML='<a href="/island-blog/" class="nb-item"><i class="fas fa-home"></i><span>首页</span></a><a href="/island-blog/social/news/" class="nb-item"><i class="fas fa-compass"></i><span>发现</span></a><div class="nb-center"><button class="nb-btn" onclick="var m=document.getElementById(\'postModal\');m.style.display=m.style.display===\'none\'?\'flex\':\'none\'"><i class="fas fa-plus"></i></button></div><a href="/island-blog/social/music/" class="nb-item"><i class="fas fa-music"></i><span>音乐</span></a><a href="/island-blog/members/" class="nb-item"><i class="fas fa-user"></i><span>我的</span></a>';document.body.appendChild(nav);var modal=document.createElement('div');modal.id='postModal';modal.style.display='none';modal.innerHTML='<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:2000" onclick=this.parentElement.style.display="none"></div><div style="position:fixed;bottom:0;left:0;right:0;max-width:500px;margin:0 auto;background:#fff;border-radius:20px 20px 0 0;padding:20px;z-index:2001"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px"><h3 style="margin:0">✍️ 写点什么</h3><button onclick=document.getElementById("postModal").style.display="none" style="background:none;border:none;font-size:1.2em;cursor:pointer">✕</button></div><textarea id="postInput" placeholder="分享你的想法..." rows="4" style="width:100%;border:1px solid #eee;border-radius:12px;padding:12px;outline:none;box-sizing:border-box"></textarea><div style="display:flex;justify-content:flex-end;margin-top:15px"><button onclick="var c=document.getElementById("postInput").value.trim();if(c){var p=JSON.parse(localStorage.getItem("island_posts")||"[]");p.unshift({content:c,date:new Date().toISOString()});localStorage.setItem("island_posts",JSON.stringify(p));document.getElementById("postInput").value="";document.getElementById("postModal").style.display="none";alert("发布成功！🎉")}else{alert("请输入内容")}" style="background:#ff6b6b;color:#fff;border:none;padding:10px 30px;border-radius:20px;cursor:pointer">发布</button></div></div>';document.body.appendChild(modal);var style=document.createElement("style");style.textContent=".mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:#fff;box-shadow:0 -2px 10px rgba(0,0,0,.08);z-index:1000;justify-content:space-around;align-items:center;padding:0 10px;padding-bottom:env(safe-area-inset-bottom)}@media(max-width:768px){.mobile-bottom-nav{display:flex}body{padding-bottom:70px}}.nb-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#888;font-size:.7em;padding:8px 12px}.nb-item i{font-size:1.4em;margin-bottom:2px}.nb-item.active{color:#ff6b6b}.nb-center{position:relative}.nb-btn{width:48px;height:48px;border-radius:50%;border:none;background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;font-size:1.4em;cursor:pointer;box-shadow:0 4px 15px rgba(255,107,107,.4);margin-top:-20px;display:flex;align-items:center;justify-content:center}";document.head.appendChild(style)})</script>
