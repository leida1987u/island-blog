# Butterfly Theme Configuration
# Docs: https://butterfly.js.org/

# ---------- 导航菜单 ----------
menu:
  首页: / || fas fa-home
  成员: /members/ || fas fa-users
  发现: /social/discover/ || fas fa-compass
  热榜: /social/news/ || fas fa-fire
  音乐: /social/music/ || fas fa-music
  关于: /about/ || fas fa-heart

# 发现子菜单
submenu:
  发现:
    每日一图: /social/photo/ || fas fa-image
    岛屿相册: /social/album/ || fas fa-images
    大事记: /social/timeline/ || fas fa-calendar
    旅行足迹: /social/travel/ || fas fa-map-marked-alt
    食谱分享: /social/recipe/ || fas fa-utensils
    岛屿投票: /social/vote/ || fas fa-poll
    年度回顾: /social/review/ || fas fa-star
    留言板: /guestbook/ || fas fa-comment-dots
    归档: /archives/ || fas fa-archive

# ---------- 头像 ----------
avatar:
  img: /images/燎原一叶.jpg
  effect: false

# ---------- 代码块 ----------
highlight_theme: light
highlight_copy: true
highlight_lang: true
code_word_wrap: true

# ---------- 社交链接 ----------
social:
  fab fa-github: https://github.com/leida1987u || GitHub

# ---------- 首页 ----------
index_img:
default_cover:
  - /img/default_cover.png

# ---------- 侧边栏 ----------
aside:
  enable: true
  position: right
  card_author:
    enable: true
    description: 毅哥和他的小伙伴们 🏝️
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/leida1987u
  card_announcement:
    enable: true
    content: 欢迎来到毅哥和他的小伙伴们！这里是一个温暖的社区 🏝️
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
  card_tags:
    enable: true
    limit: 40
  card_post_series:
    enable: true

# ---------- 文章 ----------
post_meta:
  date_type: both
  categories: true
  tags: true

toc:
  enable: true
  number: true

post_copyright:
  enable: true
  decode: false
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# ---------- 评论系统 ----------
comments:
  use: giscus
  text: true
  lazyload: false

# Giscus 配置 (需要你到 https://giscus.app 配置)
giscus:
  repo:
  repo_id:
  category:
  category_id:
  theme_light: light
  theme_dark: dark
  mapping: pathname
  reactions_enabled: true
  emit_metadata: false

# ---------- 搜索 ----------
local_search:
  enable: true
  trigger: auto
  top_n_per_article: 1
  unescape: false
  preload: true

# ---------- PWA ----------
pwa:
  enable: false

# ---------- 分析 ----------
wordcount:
  post_wordcount: true
  min2read: true
  total_wordcount: true

# ---------- 夜间模式 ----------
darkmode:
  enable: true
  button: true

# ---------- 字体 ----------
font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

# ---------- 首页封面配置 ----------
index_site_info_top:
index_top_img_height: 100vh

# ---------- 打赏 ----------
reward:
  enable: false

# ---------- Math ----------
mathjax:
  enable: false
katex:
  enable: false

# ---------- 图片懒加载 ----------
lazyload:
  enable: true
  loading_img: /img/loading.gif

# ---------- CDN ----------
CDN:
  css:
    fontawesome: https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css
  js:

# ---------- 不蒜子统计 ----------
busuanzi:
  enable: true
  site_uv: true
  site_pv: true
  page_pv: true

# ---------- Footer ----------
footer:
  owner:
    enable: true
    since: 2026
  custom_text: 毅哥和他的小伙伴们 · 岛屿来信 · 一起记录生活
  copyright:
    enable: true

# ---------- 分页 ----------
pagination:
  enable: true
  per_page: 10
  order_by: -date

# ---------- 首页文章封面 ----------
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  position: both
  default_cover:

# ---------- 自定义注入 ----------
inject:
  head:
    - <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
    - <style>.menu-list{position:relative}.menu-list .menus-item:hover .menus-item-child,.menu-list .menus-item.opened .menus-item-child{display:block}.menus-item-child{display:none;position:absolute;left:0;top:100%;background:#fff;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.1);min-width:120px;z-index:100;padding:5px 0}.menus-item-child a{display:block;padding:5px 15px;color:#333;text-decoration:none;font-size:.9em}.menus-item-child a:hover{color:#ff6b6b}</style>
    - <style>/* === 首页自定义样式 === */.home-hero{text-align:center;padding:40px 20px 20px;position:relative;z-index:10}.home-hero .hero-avatar{width:120px;height:120px;border-radius:50%;border:4px solid rgba(255,255,255,.8);box-shadow:0 8px 30px rgba(0,0,0,.15);margin:0 auto 16px;display:block;object-fit:cover}.home-hero .hero-title{font-size:1.8em;font-weight:700;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.3);margin:0 0 8px}.home-hero .hero-subtitle{font-size:1em;color:rgba(255,255,255,.85);text-shadow:0 1px 5px rgba(0,0,0,.2);margin:0 0 24px}.home-quick-nav{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:500px;margin:0 auto;padding:0 20px}.home-quick-nav a{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#fff;padding:12px 8px;border-radius:16px;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);transition:all .3s}.home-quick-nav a:hover{background:rgba(255,255,255,.25);transform:translateY(-2px)}.home-quick-nav a i{font-size:1.5em;margin-bottom:6px}.home-quick-nav a span{font-size:.75em}@media(max-width:480px){.home-quick-nav{grid-template-columns:repeat(4,1fr);gap:8px;padding:0 12px}.home-hero .hero-avatar{width:90px;height:90px}.home-hero .hero-title{font-size:1.4em}}/* === 首页功能卡片 === */.home-features{max-width:900px;margin:20px auto;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}.home-feature-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid #f0f0f0;transition:all .3s}.home-feature-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-3px)}.home-feature-card .card-icon{font-size:2em;margin-bottom:10px}.home-feature-card h3{margin:0 0 6px;font-size:1.1em;color:#333}.home-feature-card p{margin:0;color:#888;font-size:.85em;line-height:1.5}.home-feature-card .card-link{display:inline-block;margin-top:12px;color:#ff6b6b;font-size:.85em;text-decoration:none;font-weight:600}@media(max-width:768px){.home-features{grid-template-columns:1fr}}/* === 音乐播放器 === */.island-aplayer{position:fixed;bottom:70px;right:20px;z-index:999;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.15);max-width:330px}@media(min-width:769px){.island-aplayer{bottom:20px}}@media(max-width:480px){.island-aplayer{right:10px;bottom:70px;max-width:280px}}/* === 日历 === */.island-calendar{max-width:900px;margin:30px auto;padding:0 20px 100px}.island-calendar h2{text-align:center;color:#333;margin-bottom:20px;font-size:1.3em}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid #f0f0f0}.cal-header{font-weight:700;text-align:center;padding:8px 4px;color:#999;font-size:.8em}.cal-day{text-align:center;padding:10px 4px;border-radius:10px;font-size:.85em;color:#555;transition:all .2s;cursor:default}.cal-day:hover{background:#fff0f0}.cal-day.today{background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(255,107,107,.3)}.cal-day.empty{visibility:hidden}@media(max-width:480px){.cal-grid{padding:12px;gap:2px}.cal-day{padding:8px 2px;font-size:.75em}}</style>
  bottom:
    - <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
    - <script src="/island-blog/js/homepage.js"></script>
