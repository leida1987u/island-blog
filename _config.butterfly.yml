# Butterfly Theme Configuration
# Docs: https://butterfly.js.org/

# ---------- 导航菜单 ----------
menu:
  首页: / || fas fa-home
  成员: /members/ || fas fa-users
  发现: /social/discover/ || fas fa-compass
  热榜: /social/news/ || fas fa-fire
  音乐: /social/music/ || fas fa-music
  关于: /about/ || fas fa-heart

# 发现子菜单
submenu:
  发现:
    每日一图: /social/photo/ || fas fa-image
    岛屿相册: /social/album/ || fas fa-images
    大事记: /social/timeline/ || fas fa-calendar
    旅行足迹: /social/travel/ || fas fa-map-marked-alt
    食谱分享: /social/recipe/ || fas fa-utensils
    岛屿投票: /social/vote/ || fas fa-poll
    年度回顾: /social/review/ || fas fa-star
    留言板: /guestbook/ || fas fa-comment-dots
    归档: /archives/ || fas fa-archive

# ---------- 头像 ----------
avatar:
  img: /images/燎原一叶.jpg
  effect: false

# ---------- 代码块 ----------
highlight_theme: light
highlight_copy: true
highlight_lang: true
code_word_wrap: true

# ---------- 社交链接 ----------
social:
  fab fa-github: https://github.com/leida1987u || GitHub

# ---------- 首页 ----------
index_img:
default_cover:
  - /img/default_cover.png

# ---------- 侧边栏 ----------
aside:
  enable: true
  position: right
  card_author:
    enable: true
    description: 毅哥和他的小伙伴们 🏝️
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/leida1987u
  card_announcement:
    enable: true
    content: 欢迎来到毅哥和他的小伙伴们！这里是一个温暖的社区 🏝️
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
  card_tags:
    enable: true
    limit: 40
  card_post_series:
    enable: true

# ---------- 文章 ----------
post_meta:
  date_type: both
  categories: true
  tags: true

toc:
  enable: true
  number: true

post_copyright:
  enable: true
  decode: false
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# ---------- 评论系统 ----------
comments:
  use: giscus
  text: true
  lazyload: false

# Giscus 配置 (需要你到 https://giscus.app 配置)
giscus:
  repo:
  repo_id:
  category:
  category_id:
  theme_light: light
  theme_dark: dark
  mapping: pathname
  reactions_enabled: true
  emit_metadata: false

# ---------- 搜索 ----------
local_search:
  enable: true
  trigger: auto
  top_n_per_article: 1
  unescape: false
  preload: true

# ---------- PWA ----------
pwa:
  enable: false

# ---------- 分析 ----------
wordcount:
  post_wordcount: true
  min2read: true
  total_wordcount: true

# ---------- 夜间模式 ----------
darkmode:
  enable: true
  button: true

# ---------- 字体 ----------
font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

# ---------- 首页封面配置 ----------
index_site_info_top:
index_top_img_height: 100vh

# ---------- 打赏 ----------
reward:
  enable: false

# ---------- Math ----------
mathjax:
  enable: false
katex:
  enable: false

# ---------- 图片懒加载 ----------
lazyload:
  enable: true
  loading_img: /img/loading.gif

# ---------- CDN ----------
CDN:
  css:
    fontawesome: https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css
  js:

# ---------- 不蒜子统计 ----------
busuanzi:
  enable: true
  site_uv: true
  site_pv: true
  page_pv: true

# ---------- Footer ----------
footer:
  owner:
    enable: true
    since: 2026
  custom_text: 毅哥和他的小伙伴们 · 岛屿来信 · 一起记录生活
  copyright:
    enable: true

# ---------- 分页 ----------
pagination:
  enable: true
  per_page: 10
  order_by: -date

# ---------- 首页文章封面 ----------
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  position: both
  default_cover:

# ---------- 自定义注入 ----------
inject:
  head:
    - <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
    - <style>.menu-list{position:relative}.menu-list .menus-item:hover .menus-item-child,.menu-list .menus-item.opened .menus-item-child{display:block}.menus-item-child{display:none;position:absolute;left:0;top:100%;background:#fff;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.1);min-width:120px;z-index:100;padding:5px 0}.menus-item-child a{display:block;padding:5px 15px;color:#333;text-decoration:none;font-size:.9em}.menus-item-child a:hover{color:#ff6b6b}</style>
    - <style>/* === 首页自定义样式 === */.home-hero{text-align:center;padding:40px 20px 20px;position:relative;z-index:10}.home-hero .hero-avatar{width:120px;height:120px;border-radius:50%;border:4px solid rgba(255,255,255,.8);box-shadow:0 8px 30px rgba(0,0,0,.15);margin:0 auto 16px;display:block;object-fit:cover}.home-hero .hero-title{font-size:1.8em;font-weight:700;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.3);margin:0 0 8px}.home-hero .hero-subtitle{font-size:1em;color:rgba(255,255,255,.85);text-shadow:0 1px 5px rgba(0,0,0,.2);margin:0 0 24px}.home-quick-nav{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:500px;margin:0 auto;padding:0 20px}.home-quick-nav a{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#fff;padding:12px 8px;border-radius:16px;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);transition:all .3s}.home-quick-nav a:hover{background:rgba(255,255,255,.25);transform:translateY(-2px)}.home-quick-nav a i{font-size:1.5em;margin-bottom:6px}.home-quick-nav a span{font-size:.75em}@media(max-width:480px){.home-quick-nav{grid-template-columns:repeat(4,1fr);gap:8px;padding:0 12px}.home-hero .hero-avatar{width:90px;height:90px}.home-hero .hero-title{font-size:1.4em}}/* === 首页功能卡片 === */.home-features{max-width:900px;margin:20px auto;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}.home-feature-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid #f0f0f0;transition:all .3s}.home-feature-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-3px)}.home-feature-card .card-icon{font-size:2em;margin-bottom:10px}.home-feature-card h3{margin:0 0 6px;font-size:1.1em;color:#333}.home-feature-card p{margin:0;color:#888;font-size:.85em;line-height:1.5}.home-feature-card .card-link{display:inline-block;margin-top:12px;color:#ff6b6b;font-size:.85em;text-decoration:none;font-weight:600}@media(max-width:768px){.home-features{grid-template-columns:1fr}}/* === 音乐播放器 === */.island-aplayer{position:fixed;bottom:70px;right:20px;z-index:999;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.15);max-width:330px}@media(min-width:769px){.island-aplayer{bottom:20px}}@media(max-width:480px){.island-aplayer{right:10px;bottom:70px;max-width:280px}}/* === 日历 === */.island-calendar{max-width:900px;margin:30px auto;padding:0 20px 100px}.island-calendar h2{text-align:center;color:#333;margin-bottom:20px;font-size:1.3em}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid #f0f0f0}.cal-header{font-weight:700;text-align:center;padding:8px 4px;color:#999;font-size:.8em}.cal-day{text-align:center;padding:10px 4px;border-radius:10px;font-size:.85em;color:#555;transition:all .2s;cursor:default}.cal-day:hover{background:#fff0f0}.cal-day.today{background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(255,107,107,.3)}.cal-day.empty{visibility:hidden}@media(max-width:480px){.cal-grid{padding:12px;gap:2px}.cal-day{padding:8px 2px;font-size:.75em}}</style>
  bottom:
    - <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
    - <script>document.addEventListener('DOMContentLoaded',function(){/* === 移动端底部导航 === */var nav=document.createElement('div');nav.className='mobile-bottom-nav';nav.innerHTML='<a href="/island-blog/" class="nb-item"><i class="fas fa-home"></i><span>首页</span></a><a href="/island-blog/social/news/" class="nb-item"><i class="fas fa-compass"></i><span>发现</span></a><div class="nb-center"><button class="nb-btn" onclick="var m=document.getElementById(\'postModal\');m.style.display=m.style.display===\'none\'?\'flex\':\'none\'"><i class="fas fa-plus"></i></button></div><a href="/island-blog/social/music/" class="nb-item"><i class="fas fa-music"></i><span>音乐</span></a><a href="/island-blog/members/" class="nb-item"><i class="fas fa-user"></i><span>我的</span></a>';document.body.appendChild(nav);/* === 发帖弹窗 === */var modal=document.createElement('div');modal.id='postModal';modal.style.display='none';modal.innerHTML='<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:2000" onclick=this.parentElement.style.display="none"></div><div style="position:fixed;bottom:0;left:0;right:0;max-width:500px;margin:0 auto;background:#fff;border-radius:20px 20px 0 0;padding:20px;z-index:2001"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px"><h3 style="margin:0">✍️ 写点什么</h3><button onclick=document.getElementById("postModal").style.display="none" style="background:none;border:none;font-size:1.2em;cursor:pointer">✕</button></div><textarea id="postInput" placeholder="分享你的想法..." rows="4" style="width:100%;border:1px solid #eee;border-radius:12px;padding:12px;outline:none;box-sizing:border-box"></textarea><div style="display:flex;justify-content:flex-end;margin-top:15px"><button onclick="var c=document.getElementById("postInput").value.trim();if(c){var p=JSON.parse(localStorage.getItem("island_posts")||"[]");p.unshift({content:c,date:new Date().toISOString()});localStorage.setItem("island_posts",JSON.stringify(p));document.getElementById("postInput").value="";document.getElementById("postModal").style.display="none";alert("发布成功！🎉")}else{alert("请输入内容")}" style="background:#ff6b6b;color:#fff;border:none;padding:10px 30px;border-radius:20px;cursor:pointer">发布</button></div></div>';document.body.appendChild(modal);/* === 底部导航样式 === */var navStyle=document.createElement("style");navStyle.textContent=".mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:#fff;box-shadow:0 -2px 10px rgba(0,0,0,.08);z-index:1000;justify-content:space-around;align-items:center;padding:0 10px;padding-bottom:env(safe-area-inset-bottom)}@media(max-width:768px){.mobile-bottom-nav{display:flex}body{padding-bottom:70px}}.nb-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#888;font-size:.7em;padding:8px 12px}.nb-item i{font-size:1.4em;margin-bottom:2px}.nb-item.active{color:#ff6b6b}.nb-center{position:relative}.nb-btn{width:48px;height:48px;border-radius:50%;border:none;background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;font-size:1.4em;cursor:pointer;box-shadow:0 4px 15px rgba(255,107,107,.4);margin-top:-20px;display:flex;align-items:center;justify-content:center}";document.head.appendChild(navStyle);/* === 首页专属内容 === */var isHome=window.location.pathname==='/'||window.location.pathname==='/island-blog/'||window.location.pathname==='/island-blog/index.html';if(isHome){var siteInfo=document.querySelector('#site-info');if(siteInfo){var heroDiv=document.createElement('div');heroDiv.className='home-hero';heroDiv.innerHTML='<img class="hero-avatar" src="/island-blog/images/燎原一叶.jpg" alt="毅哥" onerror="this.src=\'https://api.dicebear.com/7.x/initials/svg?seed=YiGe&backgroundColor=ff6b6b\'"><h1 class="hero-title">毅哥和他的小伙伴们 🏝️</h1><p class="hero-subtitle">记录生活中的灵感碎片 · 一起成长</p><div class="home-quick-nav"><a href="/island-blog/social/discover/"><i class="fas fa-compass"></i><span>发现</span></a><a href="/island-blog/members/"><i class="fas fa-users"></i><span>成员</span></a><a href="/island-blog/social/music/"><i class="fas fa-music"></i><span>音乐</span></a><a href="/island-blog/guestbook/"><i class="fas fa-comment-dots"></i><span>留言</span></a><a href="/island-blog/social/photo/"><i class="fas fa-image"></i><span>每日一图</span></a><a href="/island-blog/social/album/"><i class="fas fa-images"></i><span>相册</span></a><a href="/island-blog/social/vote/"><i class="fas fa-poll"></i><span>投票</span></a><a href="/island-blog/about/"><i class="fas fa-heart"></i><span>关于</span></a></div>';siteInfo.appendChild(heroDiv);}/* 功能卡片 */var recentPosts=document.querySelector('#recent-posts');if(recentPosts){var featuresDiv=document.createElement('div');featuresDiv.className='home-features';featuresDiv.innerHTML='<div class="home-feature-card"><div class="card-icon">📬</div><h3>时光信箱</h3><p>写一封信给未来的自己或朋友，让时光传递温暖</p><a class="card-link" href="/island-blog/guestbook/">写一封信 →</a></div><div class="home-feature-card"><div class="card-icon">🎵</div><h3>每日歌曲</h3><p>每天推荐一首好歌，用音乐治愈心灵</p><a class="card-link" href="/island-blog/social/music/">去听歌 →</a></div><div class="home-feature-card"><div class="card-icon">📸</div><h3>每日一图</h3><p>一张图，一个故事，记录生活中的美好瞬间</p><a class="card-link" href="/island-blog/social/photo/">看今日美图 →</a></div><div class="home-feature-card"><div class="card-icon">🗳️</div><h3>岛屿投票</h3><p>参与有趣的话题投票，看看大家怎么想</p><a class="card-link" href="/island-blog/social/vote/">去投票 →</a></div><div class="home-feature-card"><div class="card-icon">👥</div><h3>群友卡片</h3><p>认识岛屿上的每一位小伙伴</p><a class="card-link" href="/island-blog/members/">认识大家 →</a></div><div class="home-feature-card"><div class="card-icon">🔥</div><h3>岛屿热榜</h3><p>最热门的讨论和话题都在这里</p><a class="card-link" href="/island-blog/social/news/">去看看 →</a></div>';recentPosts.parentNode.insertBefore(featuresDiv,recentPosts);}/* 日历 */var calDiv=document.createElement('div');calDiv.className='island-calendar';var now=new Date();var year=now.getFullYear();var month=now.getMonth();var today=now.getDate();var monthNames=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];var dayHeaders=['日','一','二','三','四','五','六'];var firstDay=new Date(year,month,1).getDay();var daysInMonth=new Date(year,month+1,0).getDate();var calHTML='<h2>📅 '+year+'年'+monthNames[month]+'</h2><div class="cal-grid">';for(var d=0;d<7;d++)calHTML+='<div class="cal-header">'+dayHeaders[d]+'</div>';for(var e=0;e<firstDay;e++)calHTML+='<div class="cal-day empty"></div>';for(var day=1;day<=daysInMonth;day++){var cls=day===today?'cal-day today':'cal-day';calHTML+='<div class="'+cls+'">'+day+'</div>';}calHTML+='</div>';calDiv.innerHTML=calHTML;document.body.appendChild(calDiv);/* 音乐播放器 */var apDiv=document.createElement('div');apDiv.id='island-aplayer';apDiv.className='island-aplayer';document.body.appendChild(apDiv);try{new APlayer({container:apDiv,mini:false,autoplay:true,theme:'#ff6b6b',loop:'all',order:'list',preload:'auto',volume:0.7,listFolded:true,audio:[{name:'晴天',artist:'周杰伦',url:'https://music.163.com/song/media/outer/url?id=185809.mp3',cover:'https://p2.music.126.net/PGROp8s3WwUGUF6nDrnQsw==/109951163351070665.jpg'},{name:'起风了',artist:'买辣椒也用券',url:'https://music.163.com/song/media/outer/url?id=1330348068.mp3',cover:'https://p2.music.126.net/MxQVjgLdCDFgzW4wC6w0hA==/109951164064948650.jpg'},{name:'光年之外',artist:'邓紫棋',url:'https://music.163.com/song/media/outer/url?id=449818641.mp3',cover:'https://p2.music.126.net/7fGgNkDLhFMEvIjY2knNew==/18613637708769609.jpg'},{name:'平凡之路',artist:'朴树',url:'https://music.163.com/song/media/outer/url?id=28082802.mp3',cover:'https://p1.music.126.net/wSMfGnjF1vYt7WU0hCLUhw==/2946384434909685.jpg'},{name:'稻香',artist:'周杰伦',url:'https://music.163.com/song/media/outer/url?id=185893.mp3',cover:'https://p2.music.126.net/PGROp8s3WwUGUF6nDrnQsw==/109951163351070665.jpg'},{name:'海阔天空',artist:'Beyond',url:'https://music.163.com/song/media/outer/url?id=346576.mp3',cover:'https://p2.music.126.net/FkIj7hGcTt9GO7Kf8EWCCQ==/109951163092191442.jpg'},{name:'小幸运',artist:'田馥甄',url:'https://music.163.com/song/media/outer/url?id=31654819.mp3',cover:'https://p2.music.126.net/Wx8Ka8y4yx1zJNT7OyKnew==/7874032855214581.jpg'},{name:'夜曲',artist:'周杰伦',url:'https://music.163.com/song/media/outer/url?id=185868.mp3',cover:'https://p2.music.126.net/PGROp8s3WwUGUF6nDrnQsw==/109951163351070665.jpg'},{name:'漂洋过海来看你',artist:'李宗盛',url:'https://music.163.com/song/media/outer/url?id=27955694.mp3',cover:'https://p2.music.126.net/bj4GyU5Y8fQrh7JQ8iP0XQ==/109951163171819565.jpg'},{name:'后来',artist:'刘若英',url:'https://music.163.com/song/media/outer/url?id=254490.mp3',cover:'https://p2.music.126.net/2oBMEnvOwqg6B8-vKQi1Ng==/109951163092188323.jpg'}]});}catch(e){console.log('APlayer init error:',e);}}})</script>
